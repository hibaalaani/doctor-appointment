services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  - type: web
    name: appointmentpro-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: appointmentpro-db
          property: connectionString
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ALLOWED_ORIGIN
        sync: false   # you'll fill this in after the frontend is deployed

  # ── React Frontend (Static Site) ────────────────────────────────────────────
  - type: static
    name: appointmentpro-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://doctor-appointment-k9kz.onrender.com

databases:
  - name: appointmentpro-db
    databaseName: appointmentpro
    user: appointmentpro
